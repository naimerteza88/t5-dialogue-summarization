# =============================================================
# Configuration for T5 Dialogue Summarization
# =============================================================
# Centralized config used by src/train.py, src/evaluate.py and
# src/predict.py. Override the run-specific values from the CLI
# (e.g. --learning_rate, --batch_size) to create new MLflow runs.

model:
  # Base pretrained checkpoint (transfer learning starting point)
  checkpoint: "t5-small"
  # Prefix recommended for T5 summarization tasks
  source_prefix: "summarize: "
  max_input_length: 256
  max_target_length: 64

dataset:
  # HuggingFace dataset id (downloaded automatically into data/)
  name: "knkarthick/samsum"
  text_column: "dialogue"
  summary_column: "summary"
  # Use a small subset for fast/reproducible runs. Set to 0 to use all.
  train_subset: 200
  eval_subset: 50
  test_subset: 50

training:
  output_dir: "models/t5-samsum"
  num_train_epochs: 1
  learning_rate: 0.0002
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  weight_decay: 0.01
  # Cap optimizer steps for quick experiment generation (-1 = disabled)
  max_steps: 50
  logging_steps: 5
  seed: 42

mlflow:
  tracking_uri: "mlruns"
  experiment_name: "t5-dialogue-summarization"

paths:
  data_dir: "data"
  models_dir: "models"
  artifacts_dir: "artifacts"
